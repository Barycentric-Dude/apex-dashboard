services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-dashboard
    ports:
      - "8081:8080"
    volumes:
      - ./data:/var/www/html/data
    networks:
      - apex-network

  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: apex-bridge
    environment:
      - MQTT_BROKER=43.204.150.164
      - MQTT_PORT=1883
      - MQTT_USERNAME=apexusr
      - MQTT_PASSWORD=jaijaishreeram
      - DASHBOARD_URL=http://dashboard:8080/api
      - MQTT_TOPICS=sensors/#,panels/#
    depends_on:
      - dashboard
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge