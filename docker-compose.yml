services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: apex-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto.passwd:/mosquitto/config/mosquitto.passwd
    networks:
      - apex-network

  website:
    image: php:8.2-apache
    container_name: apex-website
    ports:
      - "8080:80"
    volumes:
      - ./website:/var/www/html
    networks:
      - apex-network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-dashboard
    ports:
      - "8081:8080"
    volumes:
      - ./data:/var/www/html/data
    depends_on:
      - mosquitto
    networks:
      - apex-network

  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: apex-bridge
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=apex_bridge
      - MQTT_PASSWORD=dashboard_pass
      - DASHBOARD_URL=http://dashboard:8080/api
      - MQTT_TOPICS=sensors/#,panels/#
    depends_on:
      - mosquitto
      - dashboard
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge